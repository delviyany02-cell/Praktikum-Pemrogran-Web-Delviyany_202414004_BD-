<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Formulir Pendaftaran Mahasiswa Baru</title>
</head>

<body style="background-color:#afd4fd; font-family:Arial, sans-serif;">

    <!-- Container Form -->
    <div style="
        width:700px;
        margin:auto;
        margin-top:30px;
        background-color:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0px 0px 10px gray;">

        <!-- Logo Kampus -->
        <center>
           <img src="https://assets.siakadcloud.com/uploads/stitekbontang/logoaplikasi/1408.jpg" alt="Logo Kampus" width="120">
            <h1 style="color:#0056b3;">
                Formulir Pendaftaran Mahasiswa Baru
            </h1>
        </center>

        <form action="#" method="post">

            <!-- Data Pribadi -->
            <fieldset>
                <legend><b>Data Pribadi</b></legend>

                <label for="nama">Nama Lengkap:</label><br>
                <input type="text"
                       id="nama"
                       name="nama"
                       placeholder="Masukkan nama lengkap"
                       required
                       style="width:100%; padding:4px;">
                <br><br>

                <label for="email">Email:</label><br>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="contoh@email.com"
                       required
                       style="width:100%; padding:4px;">
            </fieldset>

            <br>

            <!-- Jenis Kelamin -->
            <fieldset>
                <legend><b>Jenis Kelamin</b></legend>

                <input type="radio"
                       id="pria"
                       name="jenis_kelamin"
                       value="Pria"
                       required>

                <label for="pria">Pria</label>

                <input type="radio"
                       id="wanita"
                       name="jenis_kelamin"
                       value="Wanita">

                <label for="wanita">Wanita</label>
            </fieldset>

            <br>

            <!-- Hobi -->
            <fieldset>
                <legend><b>Hobi</b></legend>

                <input type="checkbox"
                       id="membaca"
                       name="hobi[]"
                       value="Membaca">
                <label for="membaca">Membaca</label>

                <br>

                <input type="checkbox"
                       id="olahraga"
                       name="hobi[]"
                       value="Olahraga">
                <label for="olahraga">Olahraga</label>

                <br>

                <input type="checkbox"
                       id="musik"
                       name="hobi[]"
                       value="Musik">
                <label for="musik">Musik</label>
            </fieldset>

            <br>

            <!-- Jurusan -->
            <fieldset>
                <legend><b>Jurusan</b></legend>

                <label for="jurusan">Pilih Jurusan:</label><br>

                <select id="jurusan"
                        name="jurusan"
                        required
                        style="width:100%; padding:8px;">
                    <option value="">-- Pilih Jurusan --</option>
                    <option>Teknik Informatika</option>
                    <option>Teknik Elektro</option>
                    <option>Sistem Informasi</option>
                    <option>Bisnis Digital</option>
                </select>
            </fieldset>

            <br>

            <!-- Alamat -->
            <fieldset>
                <legend><b>Alamat</b></legend>

                <label for="alamat">Alamat Lengkap:</label><br>

                <textarea id="alamat"
                          name="alamat"
                          rows="4"
                          placeholder="Masukkan alamat lengkap"
                          style="width:100%;"></textarea>
            </fieldset>

            <br>

            <!-- Tombol Daftar -->
            <center>
                <input type="submit"
                       value="Daftar"
                       style="
                       background-color:#007bff;
                       color:white;
                       border:none;
                       padding:12px 30px;
                       font-size:16px;
                       border-radius:5px;
                       cursor:pointer;">
            </center>

        </form>

        <hr>

        <!-- Link Kampus -->
        <p style="text-align:center;">
            Informasi Kampus:
            <a href="https://pmb.stitek.ac.id/" target="_blank">
                Kunjungi Website Kampus
            </a>
        </p>

    </div>

</body>
</html>
